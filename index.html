<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Reader Pro | Без лимитов</title>
    
    <!-- PDF.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf_viewer.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #f4f4f7;
            --panel: #ffffff;
            --text: #1d1d1f;
            --accent: #007aff;
            --border: #d2d2d7;
        }

        [data-theme="dark"] {
            --bg: #121212;
            --panel: #1e1e1e;
            --text: #e0e0e0;
            --border: #333;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            background: var(--bg); 
            color: var(--text);
            transition: 0.3s;
        }

        /* Панель управления */
        .header {
            position: fixed;
            top: 0; width: 100%; height: 60px;
            background: var(--panel);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 1000;
            box-sizing: border-box;
        }

        .btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
        }

        /* Виджет перевода */
        #google_translate_element {
            margin-right: 10px;
        }

        /* Контейнер страниц */
        #viewer {
            margin-top: 80px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
            padding-bottom: 50px;
        }

        .page-box {
            position: relative;
            background: white;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            border-radius: 4px;
        }

        /* Текстовый слой (ВАЖНО для перевода) */
        .textLayer {
            opacity: 1; /* Делаем текст видимым для браузера */
            color: transparent; /* Но прозрачным для глаз, чтобы не мешал картинке */
            mix-blend-mode: multiply;
        }

        /* Ночной режим для PDF */
        [data-theme="dark"] canvas {
            filter: invert(0.9) hue-rotate(180deg);
        }

        input[type="file"] { display: none; }

        #loading-overlay {
            position: fixed;
            top: 60px; left: 0; width: 0%; height: 3px;
            background: var(--accent);
            z-index: 1001;
            transition: width 0.3s;
        }
    </style>
</head>
<body>

    <div class="header">
        <div>
            <label class="btn" for="fileInput">Открыть книгу</label>
            <input type="file" id="fileInput" accept="application/pdf">
            <button class="btn" onclick="toggleTheme()" style="background:#555">🌙 Тема</button>
        </div>
        
        <div style="display: flex; align-items: center;">
            <div id="google_translate_element"></div>
            <span id="pageCounter" style="font-size: 12px; margin-left: 10px;"></span>
        </div>
    </div>

    <div id="loading-overlay"></div>

    <div id="viewer">
        <div style="margin-top: 100px; text-align: center;">
            <h2>Ваша библиотека</h2>
            <p>Загрузите PDF, и Google Translate поможет с переводом без лимитов.</p>
        </div>
    </div>

    <!-- Скрипт Google Translate -->
    <script type="text/javascript">
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({
                pageLanguage: 'en',
                includedLanguages: 'ru,en',
                layout: google.translate.TranslateElement.InlineLayout.SIMPLE
            }, 'google_translate_element');
        }
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

    <script>
        const pdfjsLib = window['pdfjs-dist/build/pdf'];
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        let pdfDoc = null;
        let renderedPages = new Set();

        document.getElementById('fileInput').onchange = function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function() {
                loadPDF(new Uint8Array(this.result));
            };
            reader.readAsArrayBuffer(file);
        };

        async function loadPDF(data) {
            const viewer = document.getElementById('viewer');
            const overlay = document.getElementById('loading-overlay');
            viewer.innerHTML = '';
            renderedPages.clear();

            const loadingTask = pdfjsLib.getDocument(data);
            loadingTask.onProgress = (p) => {
                overlay.style.width = (p.loaded / p.total * 100) + '%';
            };

            pdfDoc = await loadingTask.promise;
            overlay.style.width = '0%';

            for (let i = 1; i <= pdfDoc.numPages; i++) {
                const box = document.createElement('div');
                box.className = 'page-box';
                box.id = 'p' + i;
                box.style.minHeight = '500px';
                viewer.appendChild(box);
            }

            initObserver();
        }

        async function renderPage(num) {
            if (renderedPages.has(num)) return;
            renderedPages.add(num);

            const container = document.getElementById('p' + num);
            const page = await pdfDoc.getPage(num);
            const viewport = page.getViewport({ scale: 1.5 });

            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.height = viewport.height;
            canvas.width = viewport.width;
            container.style.width = viewport.width + 'px';
            
            container.innerHTML = '';
            container.appendChild(canvas);

            await page.render({ canvasContext: ctx, viewport }).promise;

            // Генерируем текстовый слой для Google Translate
            const textContent = await page.getTextContent();
            const textLayer = document.createElement('div');
            textLayer.className = 'textLayer';
            textLayer.style.width = canvas.width + 'px';
            textLayer.style.height = canvas.height + 'px';
            textLayer.style.position = 'absolute';
            textLayer.style.top = '0';
            textLayer.style.left = '0';

            container.appendChild(textLayer);
            pdfjsLib.renderTextLayer({
                textContent,
                container: textLayer,
                viewport,
                textDivs: []
            });
        }

        function initObserver() {
            const obs = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        const id = parseInt(entry.target.id.replace('p', ''));
                        renderPage(id);
                        document.getElementById('pageCounter').innerText = `Стр: ${id} / ${pdfDoc.numPages}`;
                    }
                });
            }, { rootMargin: '1000px' });

            document.querySelectorAll('.page-box').forEach(b => obs.observe(b));
        }

        function toggleTheme() {
            const body = document.body;
            const current = body.getAttribute('data-theme');
            body.setAttribute('data-theme', current === 'dark' ? 'light' : 'dark');
        }
    </script>
</body>
</html>
