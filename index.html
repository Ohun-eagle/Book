<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Reader | Профессиональная Читалка</title>
    
    <!-- Подключение библиотек -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf_viewer.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #f5f5f7;
            --card-bg: #ffffff;
            --text: #1d1d1f;
            --accent: #0071e3;
            --border: #d2d2d7;
            --toolbar: rgba(255, 255, 255, 0.8);
        }

        [data-theme="dark"] {
            --bg: #1c1c1e;
            --card-bg: #2c2c2e;
            --text: #f5f5f7;
            --accent: #0a84ff;
            --border: #48484a;
            --toolbar: rgba(28, 28, 30, 0.8);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg); 
            color: var(--text); 
            transition: background 0.3s;
            overflow-x: hidden;
        }

        /* Панель управления */
        .toolbar {
            position: fixed;
            top: 0; width: 100%;
            height: 60px;
            background: var(--toolbar);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 20px;
            gap: 15px;
            z-index: 1000;
            justify-content: space-between;
        }

        .controls-left, .controls-right { display: flex; align-items: center; gap: 10px; }

        .btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
            transition: opacity 0.2s;
        }
        .btn:hover { opacity: 0.8; }
        .btn-secondary { background: var(--border); color: var(--text); }

        /* Контент */
        #main-container {
            margin-top: 80px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px;
            padding-bottom: 100px;
        }

        .page-wrapper {
            position: relative;
            background: var(--card-bg);
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            border-radius: 4px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .canvas-container { position: relative; }

        canvas { display: block; max-width: 100%; height: auto !important; }

        /* Текстовый слой для выделения */
        .textLayer {
            opacity: 0.2;
            cursor: text;
        }

        /* Секция перевода под страницей */
        .translation-box {
            padding: 20px;
            border-top: 1px solid var(--border);
            background: var(--card-bg);
            font-size: 16px;
            line-height: 1.6;
            display: none; /* Появляется при нажатии "Перевести" */
        }

        /* Индикатор загрузки */
        #progress-container {
            position: fixed;
            top: 60px; left: 0; width: 100%; height: 3px;
            background: transparent; z-index: 1001;
        }
        #progress-bar { width: 0%; height: 100%; background: var(--accent); transition: width 0.3s; }

        /* Всплывающая подсказка для выделенного слова */
        #word-tooltip {
            position: absolute;
            background: var(--text);
            color: var(--card-bg);
            padding: 5px 12px;
            border-radius: 6px;
            font-size: 13px;
            z-index: 2000;
            display: none;
            pointer-events: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        /* Кнопка наверх */
        #go-top {
            position: fixed; bottom: 30px; right: 30px;
            width: 45px; height: 45px;
            background: var(--accent); color: white;
            border-radius: 50%; display: none;
            justify-content: center; align-items: center;
            cursor: pointer; z-index: 999;
        }

        input[type="file"] { display: none; }

        @media (max-width: 600px) {
            .toolbar { padding: 0 10px; gap: 5px; }
            .btn { padding: 6px 10px; font-size: 12px; }
        }
    </style>
</head>
<body>

    <div class="toolbar">
        <div class="controls-left">
            <label class="btn" for="file-upload">Открыть PDF</label>
            <input type="file" id="file-upload" accept="application/pdf">
            <button class="btn btn-secondary" id="theme-toggle">🌙 Тема</button>
        </div>
        
        <div class="controls-right">
            <button class="btn" id="translate-all-btn">🌐 Перевести всё</button>
            <span id="page-info" style="font-size: 12px; color: var(--muted);"></span>
        </div>
    </div>

    <div id="progress-container"><div id="progress-bar"></div></div>

    <main id="main-container">
        <div style="text-align: center; margin-top: 100px;">
            <h2>Добро пожаловать в AI Reader</h2>
            <p style="color: grey; margin-top: 10px;">Загрузите PDF, чтобы начать чтение с переводом</p>
        </div>
    </main>

    <div id="word-tooltip"></div>
    <div id="go-top">↑</div>

    <script>
        const pdfjsLib = window['pdfjs-dist/build/pdf'];
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        let pdfDoc = null;
        let isDark = false;
        let observer = null;
        let pagesData = new Map(); // Храним текст страниц

        // --- Инициализация ---
        
        document.getElementById('file-upload').addEventListener('change', handleFileUpload);
        document.getElementById('theme-toggle').addEventListener('click', toggleTheme);
        document.getElementById('translate-all-btn').addEventListener('click', translateVisiblePages);
        document.getElementById('go-top').addEventListener('click', () => window.scrollTo({top:0, behavior:'smooth'}));

        function toggleTheme() {
            isDark = !isDark;
            document.body.setAttribute('data-theme', isDark ? 'dark' : 'light');
            document.getElementById('theme-toggle').innerText = isDark ? '☀️ Светлая' : '🌙 Темная';
        }

        async function handleFileUpload(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = async function() {
                const typedarray = new Uint8Array(this.result);
                loadPDF(typedarray);
            };
            reader.readAsArrayBuffer(file);
        }

        async function loadPDF(data) {
            const container = document.getElementById('main-container');
            const progressBar = document.getElementById('progress-bar');
            container.innerHTML = '';
            pagesData.clear();
            
            try {
                const loadingTask = pdfjsLib.getDocument(data);
                
                loadingTask.onProgress = (p) => {
                    const pct = (p.loaded / p.total) * 100;
                    progressBar.style.width = pct + '%';
                };

                pdfDoc = await loadingTask.promise;
                progressBar.style.width = '0%';
                
                // Создаем слоты для всех страниц
                for (let i = 1; i <= pdfDoc.numPages; i++) {
                    const wrapper = document.createElement('div');
                    wrapper.className = 'page-wrapper';
                    wrapper.id = `page-wrapper-${i}`;
                    wrapper.innerHTML = `<div class="canvas-container" id="canvas-p-${i}"></div>
                                         <div class="translation-box" id="trans-p-${i}">Перевод загружается...</div>`;
                    container.appendChild(wrapper);
                }

                initObserver();
            } catch (err) {
                alert("Ошибка при загрузке PDF");
                console.error(err);
            }
        }

        // --- Рендеринг и текст ---

        async function renderPage(num) {
            if (pagesData.has(num)) return; // Уже отрендерено

            const page = await pdfDoc.getPage(num);
            const scale = window.innerWidth < 768 ? 1.2 : 1.5;
            const viewport = page.getViewport({ scale });

            const canvasContainer = document.getElementById(`canvas-p-${num}`);
            const canvas = document.createElement('canvas');
            const context = canvas.getContext('2d');
            canvas.height = viewport.height;
            canvas.width = viewport.width;
            
            canvasContainer.appendChild(canvas);
            await page.render({ canvasContext: context, viewport }).promise;

            // Текстовый слой
            const textContent = await page.getTextContent();
            const textLayerDiv = document.createElement('div');
            textLayerDiv.className = 'textLayer';
            textLayerDiv.style.width = canvas.width + 'px';
            textLayerDiv.style.height = canvas.height + 'px';
            textLayerDiv.style.position = 'absolute';
            textLayerDiv.style.top = '0';
            textLayerDiv.style.left = '0';
            
            canvasContainer.appendChild(textLayerDiv);
            pdfjsLib.renderTextLayer({
                textContent,
                container: textLayerDiv,
                viewport,
                textDivs: []
            });

            // Сохраняем чистый текст для перевода
            const rawText = textContent.items.map(item => item.str).join(' ');
            pagesData.set(num, { text: rawText, translated: false });
        }

        // --- Ленивая загрузка ---

        function initObserver() {
            if (observer) observer.disconnect();
            
            observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        const pageNum = parseInt(entry.target.id.split('-').pop());
                        renderPage(pageNum);
                        document.getElementById('page-info').innerText = `Страница ${pageNum} из ${pdfDoc.numPages}`;
                    }
                });
            }, { rootMargin: '800px' });

            document.querySelectorAll('.page-wrapper').forEach(el => observer.observe(el));
        }

        // --- Перевод ---

        async function translateText(text) {
            if (!text || text.trim().length < 3) return "Нет текста для перевода.";
            
            // Используем MyMemory API (бесплатно, без ключа)
            const chunks = text.match(/.{1,500}/g) || [text]; // Разбиваем по 500 символов
            let fullTranslation = "";

            for (const chunk of chunks) {
                try {
                    const response = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(chunk)}&langpair=en|ru`);
                    const data = await response.json();
                    fullTranslation += data.responseData.translatedText + " ";
                } catch (e) {
                    fullTranslation += "[Ошибка перевода фрагмента] ";
                }
            }
            return fullTranslation;
        }

        async function translateVisiblePages() {
            const btn = document.getElementById('translate-all-btn');
            btn.innerText = "⏳ Переводим...";
            btn.disabled = true;

            const visibleWrappers = Array.from(document.querySelectorAll('.page-wrapper')).filter(el => {
                const rect = el.getBoundingClientRect();
                return rect.top < window.innerHeight && rect.bottom > 0;
            });

            for (const wrapper of visibleWrappers) {
                const num = parseInt(wrapper.id.split('-').pop());
                const data = pagesData.get(num);
                
                if (data && !data.translated) {
                    const box = document.getElementById(`trans-p-${num}`);
                    box.style.display = 'block';
                    const translation = await translateText(data.text);
                    box.innerText = translation;
                    data.translated = true;
                }
            }

            btn.innerText = "🌐 Перевести всё";
            btn.disabled = false;
        }

        // --- Интерактивное выделение слова ---

        document.addEventListener('mouseup', async (e) => {
            const selection = window.getSelection().toString().trim();
            const tooltip = document.getElementById('word-tooltip');

            if (selection && selection.length < 30 && /^[a-zA-Z]+$/.test(selection)) {
                tooltip.style.display = 'block';
                tooltip.style.left = e.pageX + 'px';
                tooltip.style.top = (e.pageY - 40) + 'px';
                tooltip.innerText = "🔍...";

                const translated = await translateText(selection);
                tooltip.innerText = translated;
            } else {
                tooltip.style.display = 'none';
            }
        });

        // Скролл наверх
        window.addEventListener('scroll', () => {
            document.getElementById('go-top').style.display = window.scrollY > 1000 ? 'flex' : 'none';
        });

    </script>
</body>
</html>
